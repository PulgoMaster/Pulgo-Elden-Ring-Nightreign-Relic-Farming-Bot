name: Compile Check

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  compile:
    name: py_compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Byte-compile all Python sources
        run: python -m compileall -q .
